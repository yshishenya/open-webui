# Airis production reverse proxy for dev.chat.airis.you
# - HTTP 80 -> HTTPS 443 redirect
# - Reverse proxy to Open WebUI backend on 127.0.0.1:3000

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name dev.chat.airis.you;

    # LetsEncrypt HTTP-01 challenge support (if using certbot --webroot)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri $uri/ =404;
    }

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name dev.chat.airis.you;

    # dev self-signed certs created in this repo path;
    # for production replace with /etc/letsencrypt/live/dev.chat.airis.you/fullchain.pem
    # and /etc/letsencrypt/live/dev.chat.airis.you/privkey.pem when certbot is used.
    ssl_certificate /opt/projects/open-webui/nginx/certs/dev.chat.airis.you/fullchain.pem;
    ssl_certificate_key /opt/projects/open-webui/nginx/certs/dev.chat.airis.you/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL_DEV_CHAT:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    client_max_body_size 100M;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        proxy_buffering off;
        proxy_request_buffering off;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 600s;
        proxy_request_buffering off;
        proxy_buffering off;
    }

    location /health {
        access_log off;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
    }
}
